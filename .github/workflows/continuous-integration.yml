name: "Continuous Integration"
on:
  pull_request:
    branches:
      - "*.x"
      - "main"
  push:
    branches:
      - "*.x"
      - "main"
jobs:
  tests:
    runs-on: 'ubuntu-latest'
    name: PHP ${{ matrix.php }} - ORM ${{ matrix.orm }} - DBAL ${{ matrix.dbal }}
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        orm: ['3.1', '^3']
        dbal: ['3.8.2', '^3', '^4']
        exclude:
          # ---- Keep ORM 3.1 + DBAL * combos only on PHP 8.1
          - php: '8.2'
            orm: '3.1'
            dbal: '3.8'
          - php: '8.3'
            orm: '3.1'
            dbal: '3.8'
          - php: '8.4'
            orm: '3.1'
            dbal: '3.8'

          - php: '8.2'
            orm: '3.1'
            dbal: '^3'
          - php: '8.3'
            orm: '3.1'
            dbal: '^3'
          - php: '8.4'
            orm: '3.1'
            dbal: '^3'

          - php: '8.2'
            orm: '3.1'
            dbal: '^4'
          - php: '8.3'
            orm: '3.1'
            dbal: '^4'
          - php: '8.4'
            orm: '3.1'
            dbal: '^4'
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpunit, git

      - name: Install Composer dependencies
        run: rm -f composer.lock

      - name: Install doctrine/orm ${{ matrix.orm }} and doctrine/dbal ${{ matrix.dbal }}
        run: composer require --no-progress --no-scripts --no-plugins "doctrine/orm:${{ matrix.orm }}" "doctrine/dbal:${{ matrix.dbal }}" -v

      - name: Update dependencies
        run: composer update --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit
